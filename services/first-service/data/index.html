<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" href="/static/beef_logo.png" type="image/png">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      Beef
    </title>

    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
      :root {
        color-scheme: light;
        --bg: #241417;
        --panel: #3a1f24;
        --panel-2: #2c171b;
        --border: #6a3942;
        --text: #fff4f4;
        --muted: #e7c9cd;
        --input-bg: #26161a;
        --accent: #d46a7a;
        --link: #ffd2d8;
        --error: #ffb3b3;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap { max-width: 1200px; margin: 0 auto; padding: 28px 18px; }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(0,0,0,.25);
      }

      .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
      h1 { margin: 0 0 8px; font-size: 22px; }
      .muted { color: var(--muted); font-size: 14px; }
      .spacer { height: 14px; }

      input, button, textarea, select {
        font: inherit;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: var(--input-bg);
        color: var(--text);
        padding: 10px 12px;
      }

      button {
        cursor: pointer;
      }

      button:hover { filter: brightness(1.08); }

      .pill {
        display: inline-block;
        padding: 5px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--input-bg);
        font-size: 12px;
        color: var(--muted);
      }

      .list { margin: 0; padding: 0; list-style: none; }

      .item {
        padding: 10px 12px;
        border: 1px solid var(--border);
        background: var(--input-bg);
        border-radius: 12px;
        margin-bottom: 10px;
      }

      .error { color: var(--error); }

      a {
        color: var(--link);
        text-decoration: none;
      }

      a:hover { text-decoration: underline; }

      .footer {
        margin-top: 14px;
        font-size: 12px;
        color: var(--muted);
      }

      .chat-layout {
        display: grid;
        grid-template-columns: 180px 220px 1fr;
        gap: 14px;
        min-height: 500px;
      }

      .sidebar,
      .messages-panel {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 12px;
      }

      .sidebar-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .sidebar-item {
        cursor: pointer;
        user-select: none;
      }

      .sidebar-item.active {
        border-color: var(--accent);
        background: var(--panel-2);
      }

      .messages-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .messages-scroll {
        flex: 1;
        min-height: 320px;
        max-height: 420px;
        overflow-y: auto;
      }

      .messages-scroll .list {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .theme-picker {
        display: flex;
        align-items: center;
        gap: 8px;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="module">
      import React, { useEffect, useLayoutEffect, useMemo, useRef, useState } from "https://esm.sh/react@18.2.0";
      import { createRoot } from "https://esm.sh/react-dom@18.2.0/client";
      import htm from "https://esm.sh/htm@3.1.1";
      const html = htm.bind(React.createElement);

      // Injected by your server (main.ts replaces {{ CLIENT_ID }})
      const GOOGLE_CLIENT_ID = "{{ CLIENT_ID }}";

      // Always post back to this server (same-origin) so cookies/SameSite=Strict work
      const AUTH_POST_URL = new URL("/auth", window.location.origin).toString();
      const THEMES = {
        rare: {
          vars: {
            "--bg": "#2a0f16",
            "--panel": "#451724",
            "--panel-2": "#34111b",
            "--border": "#8a3048",
            "--text": "#fff1f4",
            "--muted": "#f0c2cc",
            "--input-bg": "#301018",
            "--accent": "#d94b6a",
            "--link": "#ffc8d4",
          },
        },
        mediumRare: {
          vars: {
            "--bg": "#241417",
            "--panel": "#3a1f24",
            "--panel-2": "#2c171b",
            "--border": "#6a3942",
            "--text": "#fff4f4",
            "--muted": "#e7c9cd",
            "--input-bg": "#26161a",
            "--accent": "#d46a7a",
            "--link": "#ffd2d8",
          },
        },
        medium: {
          vars: {
            "--bg": "#2a1d18",
            "--panel": "#4a3128",
            "--panel-2": "#39251f",
            "--border": "#8a5b47",
            "--text": "#fff6ef",
            "--muted": "#e8d2c5",
            "--input-bg": "#33211b",
            "--accent": "#c88463",
            "--link": "#ffd9c7",
          },
        },
        wellDone: {
          vars: {
            "--bg": "#211814",
            "--panel": "#3b2a21",
            "--panel-2": "#2f221b",
            "--border": "#6f5443",
            "--text": "#f8f1ea",
            "--muted": "#d8c8bc",
            "--input-bg": "#291d17",
            "--accent": "#8b5e3c",
            "--link": "#e6c9b0",
          },
        },
      };
      function getCookie(name) {
        const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const m = document.cookie.match(new RegExp("(^|;\\s*)" + escaped + "=([^;]*)"));
        return m ? decodeURIComponent(m[2]) : "";
      }

      async function addMsgAuthorName(msg) {
        if(!("authorFriendlyName" in msg) && "authorID" in msg) {
          msg.authorFriendlyName = (await getUser(msg.authorID)).friendlyName
        }
        return msg
      }

      async function apiGetUserShort(userID) {
        // TODO: Validate userID here.
        try {
          const res = await fetch(`/users/${userID}/short`, { credentials: "include" });
          if (!res.ok) {
            console.log("API: GET /users/.../short failed with code", res.status)
            return null;
          }

          // Verify API result
          let potentialUser = await res.json();
          if("_id" in potentialUser && "friendlyName" in potentialUser) {
            return {_id:potentialUser._id, friendlyName:potentialUser.friendlyName}
          } else {
            console.log("API: GET /users/.../short returned invalid data:", JSON.stringify(potentialUser))
            return null
          }
        } catch (err) {
          console.log("API: GET /users/.../short fetch failed with error", err)
          return null
        }
        console.log("API: GET /users/.../short uncaught code branch?")
        return null // This should never be reached, but just in case.
      }

      // Gets a user from ID. Uses a cache to avoid making extra calls.
      let userCache = new Map()
      async function getUser(userID) {
        const defaultName = "Unknown"
        let result = userCache.get(userID)
        if(result === undefined) {
          // User not found in cache. Fetch user
          const potentialUser = await apiGetUserShort(userID)
          if(potentialUser === null) {
            // An error occured
            return defaultName
          } // else
          // Successfully got user. Insert into cache
          userCache.set(potentialUser._id, potentialUser)
          return potentialUser
        }
        return result // User found in cache
      }

      function setCookie(name, value, opts = {}) {
        const parts = [
          `${encodeURIComponent(name)}=${encodeURIComponent(value)}`,
          `Path=/`,
          `SameSite=Strict`,
          `Secure`,
        ];
        if (opts.maxAgeSec) parts.push(`Max-Age=${opts.maxAgeSec}`);
        document.cookie = parts.join("; ");
      }
      function applyTheme(themeKey) {
        const theme = THEMES[themeKey] ?? THEMES.mediumRare;
        const root = document.documentElement;

        for (const [key, value] of Object.entries(theme.vars)) {
          root.style.setProperty(key, value);
        }

        localStorage.setItem("beef-theme", themeKey);
      }
      function ensureCsrfToken() {
        // Your server checks: cookie g_csrf_token === body g_csrf_token
        // If GIS didn't set it (we're using callback mode), we set our own.
        let t = getCookie("g_csrf_token");
        if (!t) {
          const bytes = new Uint8Array(16);
          crypto.getRandomValues(bytes);
          t = Array.from(bytes).map(b => b.toString(16).padStart(2, "0")).join("");
          setCookie("g_csrf_token", t, { maxAgeSec: 10 * 60 });
        }
        return t;
      }

      async function waitForGIS(timeoutMs = 8000) {
        const start = Date.now();
        while (Date.now() - start < timeoutMs) {
          if (window.google?.accounts?.id) return;
          await new Promise(r => setTimeout(r, 50));
        }
        throw new Error("Google Identity Services failed to load.");
      }

      async function postIdTokenToServer(idTokenJwt) {
        const csrf = ensureCsrfToken();
        const body = new URLSearchParams({
          credential: idTokenJwt,
          g_csrf_token: csrf,
        });

        const res = await fetch(AUTH_POST_URL, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body,
          credentials: "include",
          redirect: "follow",
        });

        // Even though your server redirects to "/", cookies are still set on the 302 response.
        if (!res.ok) {
          const txt = await res.text().catch(() => "");
          throw new Error(`Auth POST failed (${res.status}). ${txt}`.trim());
        }
      }

      async function fetchMe() {
        const res = await fetch("/test-auth", { credentials: "include" });
        if (!res.ok) return null;
        const data = await res.json();
        return data?.user ?? null;
      }
      async function apiGetCurrentUserRecord() {
        const res = await fetch("/users/me", { credentials: "include" });
        if (res.status === 401) return null;
        if (!res.ok) throw new Error(`GET /users/me failed (${res.status})`);
        return await res.json();
      }

      async function apiGetMyGuilds() {
        const me = await apiGetCurrentUserRecord();
        if (me === null) return null;

        const guildIds = Array.isArray(me.guildMemberships) ? me.guildMemberships : [];
        const guilds = await Promise.all(guildIds.map(id => apiGetGuild(id)));
        return guilds.filter(Boolean);
      }
      async function apiGetGuild(guildId) {
        const res = await fetch(`/guilds/${guildId}`, { credentials: "include" });
        if (res.status === 401) return null;
        if (!res.ok) throw new Error(`GET /guilds/${guildId} failed (${res.status})`);
        return await res.json();
      }
      async function apiGetChannelMessages(guildId, channelId, options = {}) {
        const params = new URLSearchParams();

        if (options.beforeID) {
          params.set("beforeID", options.beforeID);
        }

        const qs = params.toString();
        const url = `/guilds/${guildId}/channels/${channelId}/messages${qs ? `?${qs}` : ""}`;

        const res = await fetch(url, {
          credentials: "include"
        });

        if (res.status === 401) return null;
        if (!res.ok) throw new Error(`GET messages failed (${res.status})`);
        return await res.json();
      }
      async function apiPostGuild(friendlyName) {
        const res = await fetch("/guilds", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ friendlyName }),
        });

        if (res.status === 401) return null;
        if (!res.ok) {
          const t = await res.text().catch(() => "");
          throw new Error(`POST /guilds failed (${res.status}). ${t}`.trim());
        }

        return await res.json();
      }

      async function apiPostChannel(guildId, friendlyName, type) {
        const res = await fetch(`/guilds/${guildId}/channels`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ friendlyName, type }),
        });

        if (res.status === 401) return null;
        if (!res.ok) {
          const t = await res.text().catch(() => "");
          throw new Error(`POST /guilds/${guildId}/channels failed (${res.status}). ${t}`.trim());
        }

        return await res.json();
      }
      async function apiPostChannelMessage(guildId, channelId, content) {
        const res = await fetch(`/guilds/${guildId}/channels/${channelId}/messages`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({ content }),
        });
        if (res.status === 401) return null;
        if (!res.ok) {
          const t = await res.text().catch(() => "");
          throw new Error(`POST message failed (${res.status}). ${t}`.trim());
        }
        return await res.json();
      }
      
      function getRoute() {
        const h = window.location.hash || "#/login";
        if (h.startsWith("#/chat")) return "messages";
        return "login";
      }

      function App() {
        const [route, setRoute] = useState(getRoute());
        const [user, setUser] = useState(null);
        const [status, setStatus] = useState({ kind: "idle", msg: "" });
        const [theme, setTheme] = useState(() => localStorage.getItem("beef-theme") || "mediumRare");
        useEffect(() => {
          const onHash = () => setRoute(getRoute());
          window.addEventListener("hashchange", onHash);
          return () => window.removeEventListener("hashchange", onHash);
        }, []);

        useEffect(() => {
          // If already signed in (cookie exists), jump to messages.
          (async () => {
            const me = await apiGetCurrentUserRecord();
            if (me) {
              setUser(me);
              window.location.hash = "#/chat";
            }
          })();
        }, []);
        useEffect(() => {
          applyTheme(theme);
        }, [theme]);
        return html`
          <div className="wrap">
            <div className="card">
              <div className="row" style=${{ justifyContent: "space-between" }}>
                <div>
                  <h1>Beef</h1>
                  <div className="muted">
                    ${route === "login" ? "Google OIDC sign-in" : "Messages"}
                  </div>
                </div>

                <div className="row">
                  <span className="pill">
                    ${route === "messages" ? "Messages" : "Login"}
                  </span>

                  <div className="theme-picker">
                    <label className="muted" htmlFor="themeSelect">Theme:</label>
                    <select
                      id="themeSelect"
                      value=${theme}
                      onChange=${(e) => setTheme(e.target.value)}
                    >
                      <option value="rare">Rare</option>
                      <option value="mediumRare">Medium Rare</option>
                      <option value="medium">Medium</option>
                      <option value="wellDone">Well Done</option>
                    </select>
                  </div>
                </div>
              </div>

              <div className="spacer"></div>

              ${status.kind === "error" && html`<div className="error">${status.msg}</div>`}

          ${route === "login"
               ? html`<${LoginPage}
                    onAuthed=${async () => {
                         const me = await apiGetCurrentUserRecord();
                         if (me) setUser(me);
                         window.location.hash = "#/chat";
                     }}
                     setStatus=${setStatus}
                    />`
               : html`<${MessagesPage} user=${user} setUser=${setUser} setStatus=${setStatus} />`
          }

              ${route === "login" && html`
                <div className="footer">
                  Click 'log in with google' and sign in with your google account to access Beef services.
                </div>
               `}
            </div>
          </div>
        `;
      }

      function LoginPage({ onAuthed, setStatus }) {
        const btnRef = useRef(null);

        useEffect(() => {
          let cancelled = false;

          (async () => {
            try {
              setStatus({ kind: "idle", msg: "" });
              await waitForGIS();

              if (cancelled) return;

              window.google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                ux_mode: "popup",
                auto_select: false,
                callback: async (resp) => {
                  try {
                    setStatus({ kind: "idle", msg: "" });
                    await postIdTokenToServer(resp.credential);
                    await onAuthed();
                  } catch (e) {
                    setStatus({ kind: "error", msg: e?.message ?? String(e) });
                  }
                },
              });

              // Render the Google button
              window.google.accounts.id.renderButton(btnRef.current, {
                type: "standard",
                theme: "filled_black",
                size: "large",
                text: "continue_with",
                shape: "pill",
                logo_alignment: "left",
              });
            } catch (e) {
              setStatus({ kind: "error", msg: e?.message ?? String(e) });
            }
          })();

          return () => { cancelled = true; };
        }, []);

        return html`
          <div>
            <div className="muted">
              Sign in with Google. After success, the server sets an HTTP-only <code>user_token</code> cookie, then we navigate to Messages.
            </div>
            <div className="spacer"></div>
            <div ref=${btnRef}></div>
            <div className="spacer"></div>
            <div className="muted">
              
            </div>
          </div>
        `;
      }

      function MessagesPage({ user, setUser, setStatus }) {
        const [showCreateGuild, setShowCreateGuild] = useState(false);
        const [newGuildName, setNewGuildName] = useState("");
        const [showCreateChannel, setShowCreateChannel] = useState(false);
        const [newChannelName, setNewChannelName] = useState("");
        const [newChannelType, setNewChannelType] = useState("Text");
        const [loading, setLoading] = useState(true);
        const [syncing, setSyncing] = useState(false);
        const [meLoading, setMeLoading] = useState(false);
        const [text, setText] = useState("");
        const [guilds, setGuilds] = useState([]);
        const [selectedGuild, setSelectedGuild] = useState(null);
        const [selectedChannel, setSelectedChannel] = useState(null);

        const [messages, setMessages] = useState([]);
        const [hasOlderMessages, setHasOlderMessages] = useState(true);
        const [loadingOlder, setLoadingOlder] = useState(false);

        const msgScrollRef = useRef(null);
        const scrollToBottom = useRef(false);
        

        async function loadGuilds() {
          try {
            const data = await apiGetMyGuilds();
            if (data === null) {
              setStatus({ kind: "error", msg: "Not authenticated. Please sign in again." });
              window.location.hash = "#/login";
              return;
            }

            setGuilds(data);

            if (data.length > 0) {
              const firstGuild = data[0];
              setSelectedGuild(firstGuild);
              setSelectedChannel(firstGuild.channels?.[0] ?? null);
            }
          } catch (e) {
            setStatus({ kind: "error", msg: e?.message ?? String(e) });
          }
        }

        async function processMessages(msgs) {
          return (await Promise.all(
            msgs.map(async (msg) => await addMsgAuthorName(msg))
          )).sort((a, b) => {
            if (a._id < b._id) return -1;
            if (a._id > b._id) return 1;
            return 0;
          });
        }

        async function loadLatestMessages({ silent = false } = {}) {
          if (!selectedGuild?._id || !selectedChannel?._id) {
            setMessages([]);
            setHasOlderMessages(true);
            return;
          }

          if (silent) setSyncing(true);
          else setLoading(true);

          try {
            const msgs = await apiGetChannelMessages(selectedGuild._id, selectedChannel._id);
            if (msgs === null) {
              setStatus({ kind: "error", msg: "Not authenticated. Please sign in again." });
              window.location.hash = "#/login";
              return;
            }

            const processedMsgs = await processMessages(msgs);

            setHasOlderMessages(processedMsgs.length === 50);

            setMessages(prev => {
              if (prev.length === 0) {
                scrollToBottom.current = true;
                return processedMsgs;
              }

              const prevById = new Map(prev.map(m => [m._id, m]));
              const prevNewestId = prev.length ? prev[prev.length - 1]._id : null;

              for (const msg of processedMsgs) {
                prevById.set(msg._id, msg);
              }

              const merged = Array.from(prevById.values()).sort((a, b) => {
                if (a._id < b._id) return -1;
                if (a._id > b._id) return 1;
                return 0;
              });

              const mergedNewestId = merged.length ? merged[merged.length - 1]._id : null;

              const el = msgScrollRef.current;
              if (el && !loadingOlder) {
                const nearBottom = el.scrollHeight - el.scrollTop - el.clientHeight <= 10;
                const hasNewNewestMessage = mergedNewestId !== prevNewestId;

                if (nearBottom && hasNewNewestMessage) {
                  scrollToBottom.current = true;
                }
              }

              return merged;
            });
          } catch (e) {
            setStatus({ kind: "error", msg: e?.message ?? String(e) });
          } finally {
            if (silent) setSyncing(false);
            else setLoading(false);
          }
        }

        async function loadOlderMessages() {
          if (!selectedGuild?._id || !selectedChannel?._id) return;
          if (loadingOlder || !hasOlderMessages || messages.length === 0) return;

          const oldestLoaded = messages[0];
          if (!oldestLoaded?._id) return;

          const el = msgScrollRef.current;
          if (!el) return;

          setLoadingOlder(true);

          try {
            

            const olderMsgs = await apiGetChannelMessages(
              selectedGuild._id,
              selectedChannel._id,
              { beforeID: oldestLoaded._id }
            );

            if (olderMsgs === null) {
              setStatus({ kind: "error", msg: "Not authenticated. Please sign in again." });
              window.location.hash = "#/login";
              return;
            }

            const processedOlder = await processMessages(olderMsgs);

            if (processedOlder.length === 0) {
              setHasOlderMessages(false);
              return;
            }

            

            setMessages(prev => {
              const existingIds = new Set(prev.map(m => m._id));
              const uniqueOlder = processedOlder.filter(m => !existingIds.has(m._id));
              return [...uniqueOlder, ...prev];
            });

            if (processedOlder.length < 50) {
              setHasOlderMessages(false);
            }
          } catch (e) {
            setStatus({ kind: "error", msg: e?.message ?? String(e) });
          } finally {
            setLoadingOlder(false);
          }
        }

        useEffect(() => {
          (async () => {
            setMeLoading(true);
            const me = await apiGetCurrentUserRecord();
            setMeLoading(false);

            if (!me) {
              setStatus({ kind: "error", msg: "Not authenticated. Please sign in again." });
              window.location.hash = "#/login";
              return;
            }

            setUser(me);
            await loadGuilds();
          })();
        }, [setStatus, setUser]);

        // Reset message state when switching channels
        useEffect(() => {
          setMessages([]);
          setHasOlderMessages(true);
          setLoadingOlder(false);
        }, [selectedGuild?._id, selectedChannel?._id]);

        // Initial/latest load for selected channel
        useEffect(() => {
          if (!selectedGuild?._id || !selectedChannel?._id) return;
          loadLatestMessages({ silent: false });
        }, [selectedGuild?._id, selectedChannel?._id]);

        // Maintain scroll position after prepending older messages
        useLayoutEffect(() => {
          const el = msgScrollRef.current;
          if (!el) return;


          if (scrollToBottom.current && messages.length > 0) {
            scrollToBottom.current = false;
            el.scrollTop = el.scrollHeight;
          }
        }, [messages]);

        // Load older history when user scrolls near top
        useEffect(() => {
          const el = msgScrollRef.current;
          if (!el) return;

          function onScroll() {
            if (el.scrollTop < 40) {
              loadOlderMessages();
            }
          }

          el.addEventListener("scroll", onScroll);
          return () => el.removeEventListener("scroll", onScroll);
        }, [messages, loadingOlder, hasOlderMessages, selectedGuild?._id, selectedChannel?._id]);

        // Poll for newer messages
        useEffect(() => {
          if (!selectedGuild?._id || !selectedChannel?._id) return;

          let stopped = false;
          let inFlight = false;

          const t = setInterval(async () => {
            if (stopped || inFlight) return;
            inFlight = true;
            try {
              await loadLatestMessages({ silent: true });
            } finally {
              inFlight = false;
            }
          }, 1000);

          return () => {
            stopped = true;
            clearInterval(t);
          };
        }, [selectedGuild?._id, selectedChannel?._id]);

        async function addMessage() {
          const content = text.trim();
          if (!content || !selectedGuild?._id || !selectedChannel?._id) return;

          try {
            const created = await apiPostChannelMessage(
              selectedGuild._id,
              selectedChannel._id,
              content
            );

            if (created === null) {
              setStatus({ kind: "error", msg: "Not authenticated. Please sign in again." });
              window.location.hash = "#/login";
              return;
            }

            setText("");
            const processedMsg = await addMsgAuthorName(created);
            scrollToBottom.current = true;

            setMessages(prev => {
              if (prev.some(m => m._id === processedMsg._id)) return prev;
              return [...prev, processedMsg];
            });
          } catch (e) {
            setStatus({ kind: "error", msg: e?.message ?? String(e) });
          }
        }
        async function createGuild() {
          const friendlyName = newGuildName.trim();
          if (!friendlyName) return;

          try {
            const created = await apiPostGuild(friendlyName);

            if (created === null) {
              setStatus({ kind: "error", msg: "Not authenticated. Please sign in again." });
              window.location.hash = "#/login";
              return;
            }

            setNewGuildName("");
            setShowCreateGuild(false);
            setGuilds(prev => [...prev, created]);
            setSelectedGuild(created);
            setSelectedChannel(null);
            setStatus({ kind: "idle", msg: "" });
          } catch (e) {
            setStatus({ kind: "error", msg: e?.message ?? String(e) });
          }
        }

        async function createChannel() {
          const friendlyName = newChannelName.trim();
          if (!friendlyName || !selectedGuild?._id) return;

          try {
            const created = await apiPostChannel(selectedGuild._id, friendlyName, newChannelType);

            if (created === null) {
              setStatus({ kind: "error", msg: "Not authenticated. Please sign in again." });
              window.location.hash = "#/login";
              return;
            }

            setNewChannelName("");
            setShowCreateChannel(false);

            const updatedGuild = {
              ...selectedGuild,
              channels: [...(selectedGuild.channels ?? []), created],
            };

            setSelectedGuild(updatedGuild);
            setSelectedChannel(created);
            setGuilds(prev => prev.map(g => g._id === updatedGuild._id ? updatedGuild : g));
            setStatus({ kind: "idle", msg: "" });
          } catch (e) {
            setStatus({ kind: "error", msg: e?.message ?? String(e) });
          }
        }
        return html`
          <div>
            <div className="row">
              <div className="muted">
                ${meLoading ? "Checking session..." : user ? html`Signed in as <b>${user.friendlyName ?? "Unknown"}</b>` : "Signed in"}
              </div>
              <button
                onClick=${async () => {
                  setUser(null);
                  setStatus({ kind: "idle", msg: "" });
                  window.location.hash = "#/login";
                }}
              >
                Back to Login
              </button>
            </div>

            <div className="spacer"></div>

            <div className="chat-layout">
              <div className="sidebar">
                <div className="sidebar-title">Guilds</div>
                <ul className="list">
                  ${guilds.map(g => html`
                    <li
                      key=${g._id}
                      className=${`item sidebar-item ${selectedGuild?._id === g._id ? "active" : ""}`}
                      onClick=${() => {
                        setSelectedGuild(g);
                        setSelectedChannel(g.channels?.[0] ?? null);
                      }}
                    >
                      ${g.friendlyName}
                    </li>
                  `)}
                </ul>
              </div>

              <div className="sidebar">
                <div className="sidebar-title">
                  ${selectedGuild ? selectedGuild.friendlyName : "Channels"}
                </div>

                <button onClick=${() => setShowCreateGuild(v => !v)}>
                  ${showCreateGuild ? "Cancel Guild" : "+ Guild"}
                </button>

                ${showCreateGuild && html`
                  <div className="spacer"></div>
                  <div className="row">
                    <input
                      style=${{ flex: 1 }}
                      placeholder="Guild name..."
                      value=${newGuildName}
                      onInput=${(e) => setNewGuildName(e.target.value)}
                      onKeyDown=${(e) => { if (e.key === "Enter") createGuild(); }}
                    />
                    <button onClick=${createGuild}>Save</button>
                  </div>
                `}

                <div className="spacer"></div>

                ${selectedGuild && user?._id === selectedGuild.owner && html`
                  <button onClick=${() => setShowCreateChannel(v => !v)}>
                    ${showCreateChannel ? "Cancel Channel" : "+ Channel"}
                  </button>
                `}

                ${showCreateChannel && selectedGuild && user?._id === selectedGuild.owner && html`
                  <div className="spacer"></div>
                  <div className="row">
                    <input
                      style=${{ flex: 1 }}
                      placeholder="Channel name..."
                      value=${newChannelName}
                      onInput=${(e) => setNewChannelName(e.target.value)}
                      onKeyDown=${(e) => { if (e.key === "Enter") createChannel(); }}
                    />
                    <select
                      value=${newChannelType}
                      onChange=${(e) => setNewChannelType(e.target.value)}
                    >
                      <option value="Text">Text</option>
                      <option value="Voice">Voice</option>
                    </select>
                    <button onClick=${createChannel}>Save</button>
                  </div>
                `}

                <div className="spacer"></div>

              <ul className="list">
                ${(selectedGuild?.channels ?? []).map(c => html`
                  <li
                    key=${c._id}
                    className=${`item sidebar-item ${selectedChannel?._id === c._id ? "active" : ""}`}
                    onClick=${() => setSelectedChannel(c)}
                  >
                    # ${c.friendlyName}
                  </li>
                `)}
              </ul>
              </div>

              <div className="messages-panel">
                <div className="sidebar-title">
                  ${selectedChannel ? `# ${selectedChannel.friendlyName}` : "Select a channel"}
                </div>

                <div className="messages-scroll" ref=${msgScrollRef}>
                  ${loading && messages.length === 0
                    ? html`<div className="muted">Loading messages…</div>`
                    : html`
                        ${loadingOlder ? html`<div className="muted">Loading older messages…</div>` : ""}
                        ${!hasOlderMessages && messages.length > 0 ? html`<div className="muted">Beginning of channel history</div>` : ""}
                        <ul className="list">
                          ${messages.map(m => html`
                            <li key=${String(m._id)} className="item">
                              <div className="muted"><b>${m.authorFriendlyName ?? "Unknown"}</b> • #${m._id ?? ""}</div>
                              <div>${m.content ?? ""}</div>
                            </li>
                          `)}
                        </ul>
                      `}
                </div>

                <div className="row">
                  <input
                    style=${{ flex: 1, minWidth: "240px" }}
                    placeholder=${selectedChannel ? `Message #${selectedChannel.friendlyName}` : "Select a channel first"}
                    value=${text}
                    disabled=${!selectedChannel}
                    onInput=${(e) => setText(e.target.value)}
                    onKeyDown=${(e) => { if (e.key === "Enter") addMessage(); }}
                  />
                  <button onClick=${addMessage} disabled=${!selectedChannel}>Send</button>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      createRoot(document.getElementById("root")).render(html`<${App} />`);
    </script>
  </body>
</html>
