<!DOCTYPE html>
<head></head>
<body>
  Hello World!
  <div id="remote-participants"></div>
  <video autoplay muted id="local-video"></video>
  <script>
    let pc = new RTCPeerConnection({
      iceServers:[]
    });

    let signalServer = new WebSocket("/voice");

    signalServer.addEventListener("message", async (event) => {
      let message = undefined;
      try {
        message = JSON.parse(event.data)
      } catch (err) {
        console.log("Invalid JSON received from server:", err)
        return;
      }
      if(message.type === "createOffer") { // only used on renegotiations?
        console.log("received offer")
        awaiting = false
        const remoteDesc = new RTCSessionDescription(message.sdp)
        await pc.setRemoteDescription(remoteDesc)
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer)
        signalServer.send(JSON.stringify({
          type: "createAnswer",
          sdp: answer
        }))

      } else if (message.type === "createAnswer") {
        console.log("received answer")
        console.log(JSON.stringify(message.sdp))
        awaiting = false;
        const remoteDesc = new RTCSessionDescription(message.sdp);
        await pc.setRemoteDescription(remoteDesc);
      } else if (message.type === "iceCandidate") {
        try {
          await pc.addIceCandidate(message.candidate);
        } catch (e) {
          console.error('Error adding received ice candidate', e);
        }
      }
    });

    pc.addEventListener('negotiationneeded', (event) => {
      console.log("Negotiation Needed")
    }) 

    // Listen for local ICE candidates on the local RTCPeerConnection
    pc.addEventListener('icecandidate', event => {
      if (event.candidate) {
        if(typeof event.candidate === "string"){
          signalServer.send(JSON.stringify({
            type: "iceCandidate",
            candidate: event.candidate
          }));
        } else {
            signalServer.send(JSON.stringify({ // Firefox.
            type: "iceCandidate",
            candidate: event.candidate.candidate
          }));
        }
      }
    });

    // Listen for connectionstatechange on the local RTCPeerConnection
    pc.addEventListener('connectionstatechange', event => {
      if (pc.connectionState === 'connected') {
        // Peers connected!
        console.log("peers connected!")
      }
    });

    pc.addEventListener('track', event => {
      console.log("track received")
      if(!document.getElementById("remote-video"+event.streams[0].id)) {
        var video = document.createElement("video")
        video.id = "remote-video"+event.streams[0].id
        video.muted = true;
        video.autoplay = true;
        video.srcObject = event.streams[0];

        var rmtPar = document.getElementById("remote-participants")
        rmtPar.append(video)
      }
    })

    navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    }).then(stream => {
      let lvideo = document.getElementById("local-video")
      if(lvideo) {
        lvideo.srcObject = stream;
      }
      stream.getTracks().forEach(track => pc.addTrack(track, stream)); 
    })

    let awaiting = true;
    let intID = undefined

    async function attemptConnection() {
      if(!awaiting) {
        clearInterval(intID);
        intID = undefined;
        return;
      }
      signalServer.send(JSON.stringify({
        type: isSender? "sender" : "receiver"
      }));
      if(isSender) {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer)
        signalServer.send(JSON.stringify({
          type: "createOffer",
          sdp: offer
        }))
      }
    }
    
    function connect() {
      if(intID != undefined) clearInterval(intID)
      intID = setInterval(attemptConnection, 2000)
    }
  </script>
  <button onclick="isSender = true; connect()">Sender</button>
  <!--<button onclick="isSender = false; connect()">Receiver</button> -->
</body>
</html>
